spring:
  application:
    name: ethereum-payment-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  threads:
    virtual:
      enabled: true

web3j:
  client-address: ${WEB3J_CLIENT_ADDRESS}
  polygon-endpoint: ${WEB3J_POLYGON_ENDPOINT}
  ethereum-endpoint: ${WEB3J_ETHEREUM_ENDPOINT}

payment:
  default-ttl-seconds: ${PAYMENT_DEFAULT_TTL_SECONDS:3600}
  max-ttl-seconds: ${PAYMENT_MAX_TTL_SECONDS:86400}
  expiry-check-interval-ms: ${PAYMENT_EXPIRY_CHECK_INTERVAL_MS:60000}

poller:
  enabled: ${POLLER_ENABLED:true}
  interval-ms: ${POLLER_INTERVAL_MS:15000}

auth:
  jwt:
    secret: ${JWT_SECRET}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:86400}
  siwe:
    domain: ${SIWE_DOMAIN:localhost}
    chain-id: ${SIWE_CHAIN_ID:137}
    nonce-ttl-seconds: ${SIWE_NONCE_TTL_SECONDS:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.web3pay: INFO
    org.web3j: WARN
    okhttp3: ERROR
