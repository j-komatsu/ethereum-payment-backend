spring:
  application:
    name: ethereum-payment-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  threads:
    virtual:
      enabled: true

web3j:
  client-address: ${WEB3J_CLIENT_ADDRESS}

payment:
  default-ttl-seconds: ${PAYMENT_DEFAULT_TTL_SECONDS:3600}
  max-ttl-seconds: ${PAYMENT_MAX_TTL_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.example.payment: INFO
    org.web3j: WARN
    okhttp3: ERROR
